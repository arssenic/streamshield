spring.application.name=fraud-engine

server.port=${PORT:8080}

spring.kafka.bootstrap-servers=${KAFKA_SERVER:localhost:9092}

spring.kafka.listener.auto-startup=false

spring.kafka.consumer.group-id=fraud-group

spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.properties.spring.json.use.type.headers=false

spring.kafka.consumer.properties.spring.json.value.default.type=com.pipeline.fraud_engine.model.Transaction

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}

spring.datasource.username=${PGUSER}

spring.datasource.password=${PGPASSWORD}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
